name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (Linux PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          libssl-dev zlib1g-dev libcurl4-openssl-dev

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(nproc)

    - name: Smoke test (extension loads + core classes present)
      run: |
        php -n -d extension=modules/kislayphp_extension.so -r "
          if (!class_exists('Kislay\\Core\\App')) { fwrite(STDERR, 'FAIL: Kislay\\Core\\App missing\n'); exit(1); }
          if (!class_exists('Kislay\\ServiceClient')) { fwrite(STDERR, 'FAIL: Kislay\\ServiceClient missing\n'); exit(1); }
          echo 'Extension loaded OK\n';
        "

    - name: Run PHP tests
      run: make test TESTS="-q --show-diff"
      continue-on-error: true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-linux-php${{ matrix.php-version }}
        path: "*.txt"
        if-no-files-found: ignore

  macos:
    name: Build & Test (macOS PHP ${{ matrix.php-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install system dependencies
      run: brew install openssl curl

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(sysctl -n hw.logicalcpu)

    - name: Smoke test (extension loads)
      run: |
        php -n -d extension=modules/kislayphp_extension.so -r "
          if (!class_exists('Kislay\\Core\\App')) { exit(1); }
          echo 'Extension loaded OK\n';
        "

    - name: Run PHP tests
      run: make test TESTS="-q --show-diff"
      continue-on-error: true

  windows:
    # Phase 3 goal: MSVC build via PHP SDK Binary Tools.
    # The phpsdk-vs17-x64.bat spawns a subshell so commands after CALL
    # don't inherit the environment. Full Windows support is tracked at:
    # https://github.com/KislayPHP/core/issues (Phase 3)
    name: Build (Windows PHP ${{ matrix.php-version }}) [experimental]
    runs-on: windows-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring
        tools: composer

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download PHP SDK Binary Tools
      shell: pwsh
      run: |
        git clone --depth=1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk

    - name: Build extension via PHP SDK env
      shell: pwsh
      run: |
        $phpArch = if ([Environment]::Is64BitOperatingSystem) { "x64" } else { "x86" }
        $sdkBat  = "C:\php-sdk\phpsdk-vs17-$phpArch.bat"
        # Write a build script that runs INSIDE the sdk environment
        $buildScript = @"
        cd /d ${{ github.workspace }}
        phpize
        configure --enable-kislayphp_extension
        nmake
        "@
        $buildScript | Out-File -FilePath C:\build_kislay.bat -Encoding ASCII
        # The bat spawns a Developer Command Prompt and runs our script
        $proc = Start-Process -FilePath "cmd.exe" `
          -ArgumentList "/c `"$sdkBat`" -t `"C:\build_kislay.bat`"" `
          -Wait -PassThru -NoNewWindow
        exit $proc.ExitCode

  ecosystem:
    name: Ecosystem Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          libssl-dev zlib1g-dev libcurl4-openssl-dev apache2-utils wrk

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(nproc)

    - name: Run strict ecosystem workflow
      run: make task-ci
      continue-on-error: true
