name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test (Linux PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install system dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          libssl-dev zlib1g-dev libcurl4-openssl-dev

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(nproc)

    - name: Smoke test (extension loads)
      run: |
        php -n -d extension=modules/kislayphp_extension.so -r "
          if (!class_exists('Kislay\\Core\\App')) { exit(1); }
          if (!class_exists('Kislay\\ServiceClient')) { exit(1); }
          echo 'Extension loaded OK\n';
        "

    - name: Run PHP tests
      run: make test TESTS="-q --show-diff"
      continue-on-error: true   # Tests under active development

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-linux-php${{ matrix.php-version }}
        path: "*.txt"
        if-no-files-found: ignore

  macos:
    name: Build & Test (macOS PHP ${{ matrix.php-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install system dependencies
      run: brew install openssl curl

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(sysctl -n hw.logicalcpu)

    - name: Smoke test (extension loads)
      run: |
        php -n -d extension=modules/kislayphp_extension.so -r "
          if (!class_exists('Kislay\\Core\\App')) { exit(1); }
          echo 'Extension loaded OK\n';
        "

    - name: Run PHP tests
      run: make test TESTS="-q --show-diff"
      continue-on-error: true

  windows:
    name: Build (Windows PHP ${{ matrix.php-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring
        tools: composer

    - name: Install Visual C++ Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Download PHP SDK Binary Tools
      shell: pwsh
      run: |
        git clone --depth=1 https://github.com/php/php-sdk-binary-tools.git C:\php-sdk
        $phpBin = (Get-Command php).Source
        Write-Host "PHP binary: $phpBin"

    - name: Build extension (Windows MSVC)
      shell: cmd
      run: |
        FOR /F "tokens=*" %%i IN ('php -r "echo PHP_MAJOR_VERSION . PHP_MINOR_VERSION;"') DO SET PHP_VER=%%i
        FOR /F "tokens=*" %%i IN ('php -r "echo PHP_INT_SIZE == 8 ? 'x64' : 'x86';"') DO SET ARCH=%%i
        SET SDK=C:\php-sdk
        CALL %SDK%\phpsdk-vs17-%ARCH%.bat && phpsdk_buildtree phpmaster
        cd /D %GITHUB_WORKSPACE%
        phpize
        configure --enable-kislayphp_extension
        nmake

    - name: Note (Windows tests not yet configured)
      shell: cmd
      run: echo Windows build complete - test runner not yet configured for Windows

  ecosystem:
    name: Ecosystem Validation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, intl
        tools: phpize, composer

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y --no-install-recommends \
          libssl-dev zlib1g-dev libcurl4-openssl-dev apache2-utils wrk

    - name: Build extension
      run: |
        phpize
        ./configure
        make -j$(nproc)

    - name: Run strict ecosystem workflow
      run: make task-ci
      continue-on-error: true
